# /etc/netplan/01-lab-config.yaml — VM-B
# This file configures VM-B on Subnet 20 with a static route to Subnet 10.
#
# Apply with: sudo netplan apply
# Test with:  sudo netplan try

network:
  version: 2
  renderer: networkd
  ethernets:

    # NAT adapter — internet access for package installs
    enp0s3:
      dhcp4: true

    # Internal Network: Subnet 20
    enp0s8:
      addresses:
        - 192.168.20.10/24
      routes:
        # Static route: "To reach Subnet 10, send packets to VM-A's
        # interface on this subnet (192.168.20.1)"
        - to: 192.168.10.0/24
          via: 192.168.20.1
