# /etc/sysctl.d/99-ip-forward.conf — Enable IPv4 packet forwarding
#
# Place this file on VM-A (the router).
# This makes the ip_forward setting persistent across reboots.
#
# Without this, VM-A will accept packets on one interface but refuse
# to forward them out another interface — defeating the purpose of
# having two subnets connected through it.
#
# Apply immediately with: sudo sysctl -p /etc/sysctl.d/99-ip-forward.conf
# Verify with:            sysctl net.ipv4.ip_forward (should return 1)

net.ipv4.ip_forward=1
